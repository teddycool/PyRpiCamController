[global]
   workgroup = WORKGROUP
   server string = Camera File Share
   security = user
   map to guest = bad user
   guest account = pi
   name resolve order = bcast host lmhosts wins
   wins support = yes
   disable spoolss = yes
   load printers = no
   printing = bsd
   printcap name = /dev/null
   min protocol = SMB2
   server min protocol = SMB2
   unix extensions = no

[shared]
   comment = Shared Files
   path = /home/pi/shared
   guest ok = yes
   guest only = yes
   force user = pi
   force group = pi
   writable = yes
   read only = no
   public = yes
   browseable = yes
   create mask = 0666
   directory mask = 0777
   force create mode = 0666
   force directory mode = 0777
   delete readonly = yes

[FileShare]
   comment = Shared Files (legacy name)
   path = /home/pi/shared
   guest ok = yes
   guest only = yes
   force user = pi
   force group = pi
   writable = yes
   read only = no
   public = yes
   browseable = no
   create mask = 0666
   directory mask = 0777
   force create mode = 0666
   force directory mode = 0777
   delete readonly = yes
