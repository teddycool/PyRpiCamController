#
# Simple Samba configuration for guest file sharing only
# No home directories or printer sharing
#

#======================= Global Settings =======================

[global]
   # Workgroup/domain name
   workgroup = BEECAM
   
   # Server identification
   server string = Camera File Share
   netbios name = %h
   
   # Server role - standalone for simple file sharing
   server role = standalone server
   
   # Security settings for guest access
   security = user
   map to guest = bad user
   guest account = pi
   
   # Disable unused services
   disable spoolss = yes
   load printers = no
   printing = bsd
   printcap name = /dev/null
   
   # Logging
   log file = /home/pi/shared/logs/sambalog.%m
   max log size = 10000
   logging = file
   
   # Performance and compatibility
   socket options = TCP_NODELAY IPTOS_LOWDELAY SO_RCVBUF=131072 SO_SNDBUF=131072
   min protocol = SMB2
   max protocol = SMB3
   
   # File system options
   unix extensions = no
   follow symlinks = yes
   wide links = yes
   
   # Guest access settings
   usershare allow guests = yes

#======================= Share Definitions =======================

# Main file share - accessible by all guests with read/write access
[FileShare]
   comment = Shared Files
   path = /home/pi/shared
   browseable = yes
   writable = yes
   guest ok = yes
   guest only = yes
   public = yes
   create mask = 0666
   directory mask = 0777
   force user = pi
   force group = pi
